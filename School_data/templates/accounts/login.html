{% extends 'base.html' %}

{% block title %}Login - Rutabo SMS{% endblock %}

{% block extra_css %}
<style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }
    .sidebar, .navbar {
        display: none;
    }
    .main-content {
        margin-left: 0;
        width: 100%;
        align-items: center;
        justify-content: center;
    }
    .login-card {
        width: 100%;
        max-width: 400px;
        background: white;
        border-radius: 20px;
        padding: 3rem 2rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .login-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }
    .login-logo {
        width: 60px;
        height: 60px;
        background: var(--primary);
        color: white;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        margin: 0 auto 1.5rem;
        box-shadow: 0 8px 16px rgba(37, 99, 235, 0.4);
    }
    .form-group {
        margin-bottom: 1.5rem;
    }
    .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: #475569;
        margin-bottom: 0.5rem;
    }
    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        transition: var(--transition);
        font-size: 0.95rem;
    }
    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
    .login-btn {
        width: 100%;
        padding: 0.8rem;
        font-size: 1rem;
        margin-top: 1rem;
        justify-content: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-card">
    <div class="login-header">
        <div class="login-logo"><i class="fas fa-graduation-cap"></i></div>
        <h2 style="font-weight: 700; color: #0f172a;">Welcome Back</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-top: 0.5rem;">Sign in to your account to continue</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary login-btn">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
